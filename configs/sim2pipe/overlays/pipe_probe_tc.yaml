# Overlay template for a pipe-probe cell, consumed by the main repo's
# src.data.slice.totalcapture. The driver (03_run_pipe_probe) injects per-cell
# values via dot-path overrides: project, work_dir, slice.root, slice.out_dir,
# slice.{train,val,test}_subjects, train.seed.

project: sim2pipe_probe

slice:
  # Adapter defaults already match the frozen sim2real split
  # (totalcapture_subject_v1: S1-S3 / S4 / S5); stated explicitly anyway.
  train_subjects: "S1,S2,S3"
  val_subjects: "S4"
  test_subjects: "S5"
  window_len: 24
  stride: 16
  sensor_order: "L_LowLeg,R_LowLeg,L_LowArm,R_LowArm"
  skeleton_source: vicon
  skeleton_normalize: true

train:
  seed: __INJECTED__
  imu_sensor: R_LowArm
  repeat_single_sensor: 4
